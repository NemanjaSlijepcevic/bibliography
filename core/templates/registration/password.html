{% extends 'base.html' %}
{% load django_bootstrap5 %}
{% load i18n %}
{% block content %}
<h4>{% trans 'Change password'%}</h4>

<form method="POST" class="mb-3">
    {% csrf_token %}
    {% bootstrap_form form %}
    <div class="d-flex justify-content-between">
        <button type="submit" class="btn btn-primary">{% trans 'Change'%}</button>
    </div>
</form>

{% endblock %}
