{% load i18n %}
<div class="p-2">
    <form id="book-search-form" method="post">
        {% csrf_token %}
        <label for="search-field" class="form-label h4">{% trans "Search" %}</label>
        <input class="form-control mt-2" type="text" name="search-field" id="search-field" placeholder="{% trans 'Search books' %}" aria-label="default input example"/>
        <button id="search-field-btn" type="submit" style="display: none;">{% trans "Check" %}</button>
    </form>
</div>

<div class="accordion p-2" id="accordionFlushExample">
    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
                {% trans "Categories" %}
            </button>
        </h2>
        <div id="flush-collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionFlushExample">
            <div class="accordion-body">
                <form id="category-filter-form" method="get">
                    {% for category in categories %}
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="category-{{ category.id }}"
                            name="categories" value="{{ category.id }}" {% if category.id in selected_categories %}checked{% endif %}>
                        <label class="form-check-label" for="category-{{ category.id }}">
                            {{ category.name }}
                        </label>
                    </div>
                    {% endfor %}
                </form>
            </div>
        </div>
    </div>
</div>
