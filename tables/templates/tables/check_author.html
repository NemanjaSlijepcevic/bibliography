{% extends 'base.html' %}
{% load i18n %}
{% load django_bootstrap5 %}
{% block content %}
    <h1>{% trans "Check if Author Exists" %}</h1>
    <form id="author-check-form" method="post">
        {% csrf_token %}
        <label for="{{ form.name.id_for_label }}">{% trans "Author" %}</label>
        {{ form.name }}
        <button id="check-author-btn" type="submit" style="display: none;">{% trans "Check" %}</button>
    </form>

    <div id="author-result"></div>

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function () {
            const authorNameInput = document.querySelector('input[name="name"]');
            if (!authorNameInput) {
                console.error("Input field for 'form.name' not found");
                return;
            }

            const resultContainer = document.getElementById('author-result');
            const form = document.getElementById('author-check-form');
            
            authorNameInput.addEventListener('input', function() {
                const authorName = authorNameInput.value.trim();

                if (authorName === '') {
                    resultContainer.innerHTML = '';
                    return;
                }

                const formData = new FormData(form);
                formData.append('author', authorName);

                fetch("{% url 'books:author-check' %}", {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': formData.get('csrfmiddlewaretoken')
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.exists !== null) {
                        resultContainer.innerHTML = "";

                        const statusText = document.createElement('p');
                        statusText.style.fontWeight = 'bold';
                        statusText.style.color = data.exists ? 'green' : 'red';
                        statusText.textContent = data.exists ? 'Author exists!' : 'Author does not exist.';
                        resultContainer.appendChild(statusText);

                        const authorsList = document.createElement('ul');
                        authorsList.classList.add('list-unstyled');
                        resultContainer.appendChild(authorsList);

                        if (data.exists && data.books) {
                            for (const author in data.books) {
                                if (data.books.hasOwnProperty(author)) {
                                    const authorItem = document.createElement('li');
                                    const authorName = document.createElement('b');
                                    authorName.textContent = author;
                                    authorItem.appendChild(authorName);
                                    authorsList.appendChild(authorItem);

                                    const booksList = document.createElement('ul');
                                    authorItem.appendChild(booksList);

                                    data.books[author].forEach(book => {
                                        const bookItem = document.createElement('li');
                                        bookItem.textContent = book;
                                        booksList.appendChild(bookItem);
                                    });
                                }
                            }
                        }
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    resultContainer.innerHTML = '<p style="color: red;">An error occurred while checking the author.</p>';
                });
            });
        });
    </script>
{% endblock %}
